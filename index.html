<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mobile First</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="media.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<body>

   <header class="header">
    <div class="container_logo">
        <img src="./img/img.png" alt="">
    </div>
   </header>

   <div class="screen_left_bar">
    <div class="screen_header">

        <div class="screen_logo">
            <img src="./img/img.png" alt="">
        </div> 
        <div class="screen_text_logo"><p>FullStats</p></div>
    </div>
  
    <img src="./img/Artboard.png" alt="" class="screen_hero">
   </div>

   <div class="container">

        <div class="register_text">
            <h1>Зарегистрироваться</h1>
            <p>Зарегистрируйтесь, чтобы начать работу с сервисом:</p>
        </div>

        <div class="register_content">

            <form action="" method="get">
                

                <!-- Имя и Фамилия на больших экранах
                должны быть вместе с другой шириной -->
                <div class="screen_text">
                    <input type="text" placeholder="Имя" name="Имя" required>
                    <input type="text" placeholder="Фамилия" name="Фамилия" required>
                </div>
                <!-- Имя и Фамилия на больших экранах
                должны быть вместе с другой шириной -->

                <input type="email" placeholder="Email" name="Email" required>
                <input type="password" placeholder="Пароль" name="Пароль" required>

                <button type="submit">Зарегистрироваться</button>
            </form>
        </div>

        <div class="privacy_policy">
            <p> <span>Регистрируясь, я соглашаюсь с минимальными условиями
                обслуживания и</span> <a href="#!">Политикой конфиденциальности.</a></p>
        </div>

        <div class="sign_up">
            <p>Уже есть аккаунт? <a href="#!">Войти</a> </p>
        </div>
        
   </div>



</body>
</html>
